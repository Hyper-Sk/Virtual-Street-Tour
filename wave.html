<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: green;
      }
      .wave-wrapper {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 300px;
        overflow: hidden;
      }

      .wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 200%; /* Important */
        height: 100%;
        animation: waveMove 12s linear infinite;
      }

      @keyframes waveMove {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
    </style>
  </head>
  <body>
  <div class="wave-wrapper">
    <svg class="wave" viewBox="0 0 2880 320" preserveAspectRatio="none">
        <path fill="#0a6d85"
        d="M0,160 C300,280 500,20 900,120 C1200,200 1300,260 1440,180
           C1740,100 1940,300 2340,180
           C2640,80 2780,220 2880,180
           L2880,320 L0,320 Z">
        </path>
    </svg>
</div>

  </body>
</html>
